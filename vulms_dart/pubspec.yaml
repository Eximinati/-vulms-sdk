name: vulms_dart
description: >-
  Dart SDK for Virtual University LMS (VULMS). Fetch assignments, quizzes,
  GDBs, lectures, grades, and calendar events with smart caching and
  session management. Flutter-first, production-ready.
version: 0.1.0
homepage: https://github.com/your-org/vulms_dart
repository: https://github.com/your-org/vulms_dart
issue_tracker: https://github.com/your-org/vulms_dart/issues

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  dio: ^5.4.0
  html: ^0.15.4
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

dev_dependencies:
  test: ^1.31.1
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  build_runner: ^2.15.0
  mockito: ^5.6.4
